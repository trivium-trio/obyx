name: Frontend PR Checks

#Run this whenever a PR is opened against develop or main
on:
  pull_request:
    branches:
      - develop
      - main


jobs:
  validate-frontend:
 
    runs-on: ubuntu-latest

   
    steps:
    
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'      
          cache-dependency-path: './frontend/package-lock.json'

      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run Linter
        working-directory: ./frontend
        run: npm run lint
      - name: Test Build
        working-directory: ./frontend
        run: npm run build
